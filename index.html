<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Título Principal da Página -->
    <title>Achar Temas | Entenda o Mundo com Mais Clareza</title>

    <!-- Ícone da Aba (Favicon) -->
    <link rel="icon" type="image/png" href="/wp-images/Favicon-AT-1.png" />
    <link rel="apple-touch-icon" href="/wp-images/Favicon-AT-1.png" />

    <!-- Meta Tags SEO Básicas -->
    <meta name="description" content="Um blog criado especialmente para você encontrar respostas e explorar novas ideias. Conteúdos sobre diversos temas, dicas, conhecimentos profundos e produtos curados." />
    <meta name="keywords" content="blog, artigos, conhecimento, tecnologia, curiosidades, aprender, achar temas, entretenimento, cultura nerd, dicas, shopee" />
    <meta name="author" content="Neverson Camargo" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#F47B20" />
    <link rel="canonical" href="https://achartemas.com/" />

    <!-- Meta Tags Open Graph (Facebook, LinkedIn, WhatsApp, Instagram) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://achartemas.com/" />
    <meta property="og:title" content="Achar Temas | Entenda o Mundo com Mais Clareza" />
    <meta property="og:description" content="Explore novas ideias e encontre as respostas que procura. Um blog feito para mentes curiosas! Acesse agora e confira nossos novos artigos." />
    <meta property="og:site_name" content="Achar Temas" />
    <!-- Imagem recomendada para Open Graph deve ter pelo menos 1200x630. Usando o logo do site como base, mas o ideal seria uma capa chamativa. -->
    <meta property="og:image" content="/wp-images/Favicon-AT-1.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />

    <!-- Meta Tags para o Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://achartemas.com/" />
    <meta name="twitter:title" content="Achar Temas | Entenda o Mundo com Mais Clareza" />
    <meta name="twitter:description" content="Explore novas ideias e encontre as respostas que procura. Um espaço de conhecimento e curiosidades." />
    <meta name="twitter:image" content="/wp-images/Favicon-AT-1.png" />

    <!-- Outras propriedades úteis para otimização em aplicativos de mensagens -->
    <meta property="og:locale" content="pt_BR" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
